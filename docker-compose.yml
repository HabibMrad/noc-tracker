version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-production}
      - DATABASE_URL=sqlite:////data/noc.db
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:habib.mrad.19383@gmail.com}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - REPORT_EMAIL_TO=${REPORT_EMAIL_TO}
      - REPORT_EMAIL_FROM=${REPORT_EMAIL_FROM}
    volumes:
      - db_data:/data
      - ./backend/uploads:/app/uploads
    networks:
      - noc_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
        - VITE_VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
    networks:
      - noc_net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - noc_net
    restart: unless-stopped

volumes:
  db_data:

networks:
  noc_net:
    driver: bridge
