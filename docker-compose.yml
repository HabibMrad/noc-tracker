version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-production}
      - DATABASE_URL=sqlite:////data/noc.db
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
    volumes:
      - db_data:/data
      - ./backend/uploads:/app/uploads
    networks:
      - noc_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    networks:
      - noc_net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - noc_net
    restart: unless-stopped

volumes:
  db_data:

networks:
  noc_net:
    driver: bridge
